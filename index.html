<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS · MULTICUENTAS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Clash+Display:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:       #060609;
  --surface:  #0e0e16;
  --card:     #13131e;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #ddd8f0;
  --muted:    #5c5875;
  --dim:      #3a3755;
  --lime:     #c8ff47;
  --lime-dim: rgba(200,255,71,0.12);
  --tiktok:   #25f4ee;
  --ig:       #f56040;
  --fb:       #4f9cf9;
  --yt:       #ff4444;
  --radius:   14px;
  --mono: 'DM Mono', monospace;
  --display: 'Clash Display', 'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
}

#loading-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; gap: 16px;
}
.loader-ring {
  width: 48px; height: 48px;
  border: 2px solid var(--border2);
  border-top-color: var(--lime);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-title {
  font-family: var(--display);
  font-size: 1.4rem; font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text);
}
#load-status { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }

.topbar {
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0;
  background: rgba(6,6,9,0.92);
  backdrop-filter: blur(20px);
  z-index: 100;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--lime);
  box-shadow: 0 0 8px var(--lime), 0 0 20px rgba(200,255,71,0.4);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 8px var(--lime), 0 0 20px rgba(200,255,71,0.4); }
  50%      { box-shadow: 0 0 4px var(--lime), 0 0 10px rgba(200,255,71,0.2); }
}
.brand-name {
  font-family: var(--display);
  font-size: 1rem; font-weight: 700;
  letter-spacing: 0.08em;
}
.brand-name span { color: var(--lime); }

.reload-btn {
  background: none; border: 1px solid var(--border2);
  color: var(--muted); padding: 6px 14px;
  border-radius: 8px; cursor: pointer;
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  transition: 0.2s;
}
.reload-btn:hover { border-color: var(--lime); color: var(--lime); }

.tab-bar {
  display: flex; gap: 2px; padding: 0 2rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  padding: 14px 18px;
  color: var(--muted);
  border: none; background: none;
  cursor: pointer; font-family: var(--mono);
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: 0.25s; white-space: nowrap;
  border-bottom: 2px solid transparent;
  position: relative; top: 1px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--lime); border-bottom-color: var(--lime); }

.content {
  padding: 2rem;
  max-width: 1360px;
  margin: 0 auto;
}

.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 1.5rem;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.4rem 1.6rem;
  transition: border-color 0.25s, transform 0.25s;
}
.card:hover { border-color: var(--border2); transform: translateY(-2px); }
.card-label {
  font-size: 9px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--muted); margin-bottom: 10px;
}
.card-val {
  font-family: var(--display);
  font-size: 2rem; font-weight: 700;
  line-height: 1;
}

.card.hero {
  border-color: rgba(200,255,71,0.2);
  background: linear-gradient(135deg, #0e1408 0%, #13131e 100%);
}
.card.hero .card-val { color: var(--lime); }
.card.hero .card-label { color: rgba(200,255,71,0.5); }

.card[data-plat="TikTok"]    { border-left: 3px solid var(--tiktok); }
.card[data-plat="Instagram"] { border-left: 3px solid var(--ig); }
.card[data-plat="Facebook"]  { border-left: 3px solid var(--fb); }
.card[data-plat="YouTube"]   { border-left: 3px solid var(--yt); }

.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.6rem;
  margin-bottom: 1.5rem;
}
.panel-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 1.4rem;
}
.panel-title {
  font-size: 9px; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--muted);
}

.chart-wrap { position: relative; height: 280px; }
.charts-row {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 12px;
  margin-bottom: 1.5rem;
}
@media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }

.acc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.acc-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.2rem 1.4rem;
  transition: border-color 0.25s;
}
.acc-card:hover { border-color: var(--border2); }
.acc-name {
  font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
  margin-bottom: 10px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.acc-total {
  font-family: var(--display);
  font-size: 1.7rem; font-weight: 700;
  color: var(--lime); margin-bottom: 12px;
}
.plat-bars { display: flex; flex-direction: column; gap: 5px; }
.plat-row { display: flex; align-items: center; gap: 8px; }
.plat-name { font-size: 9px; color: var(--muted); width: 68px; letter-spacing: 0.05em; flex-shrink: 0; }
.plat-bar-bg {
  flex: 1; height: 4px;
  background: var(--border); border-radius: 2px; overflow: hidden;
}
.plat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(0.2,0.8,0.2,1); }
.plat-val { font-size: 9px; color: var(--dim); width: 50px; text-align: right; }

.week-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 1.5rem;
}
.week-badge {
  background: var(--lime-dim);
  border: 1px solid rgba(200,255,71,0.25);
  color: var(--lime); border-radius: 8px;
  padding: 4px 12px; font-size: 10px;
  letter-spacing: 0.1em;
}

.top-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.top-table th {
  text-align: left; color: var(--muted);
  font-size: 9px; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 0 0 10px;
  border-bottom: 1px solid var(--border);
}
.top-table td {
  padding: 10px 0; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.top-table tr:last-child td { border-bottom: none; }
.rank-num {
  font-family: var(--display); font-size: 0.95rem;
  font-weight: 700; color: var(--dim); width: 28px;
}
.rank-1 .rank-num { color: var(--lime); }
.rank-2 .rank-num { color: #aaa; }
.rank-3 .rank-num { color: #cd7f32; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim     { animation: fadeUp 0.45s cubic-bezier(0.2,0.8,0.2,1) both; }
.anim-d1  { animation-delay: 0.05s; }
.anim-d2  { animation-delay: 0.10s; }
.anim-d3  { animation-delay: 0.15s; }

@media (max-width: 680px) {
  .content { padding: 1rem; }
  .card-val { font-size: 1.6rem; }
  .topbar { padding: 0.9rem 1rem; }
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loader-ring"></div>
  <div class="loader-title">GIS · MULTICUENTAS</div>
  <div id="load-status">Sincronizando datos...</div>
</div>

<div id="dash" style="display:none">
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div class="brand-name">GIS · <span>MULTICUENTAS</span></div>
    </div>
    <button class="reload-btn" onclick="location.reload()">↺ Recargar</button>
  </div>
  <div class="tab-bar" id="tabs"></div>
  <div class="content" id="main"></div>
</div>

<script>
const PLATS   = ['TikTok', 'Instagram', 'Facebook', 'YouTube'];
const PCOLORS = {
  TikTok:    '#25f4ee',
  Instagram: '#f56040',
  Facebook:  '#4f9cf9',
  YouTube:   '#ff4444'
};
const ACC_COLORS = ['#c8ff47','#25f4ee','#f56040','#4f9cf9','#ff4444','#a78bfa','#fbbf24','#34d399','#fb923c','#e879f9'];
let chartInstances = [];

window.onload = async () => {
  const status = document.getElementById('load-status');
  try {
    status.textContent = 'Buscando datos.xlsx...';
    const r = await fetch('datos.xlsx?t=' + Date.now());
    if (!r.ok) throw new Error('Archivo no encontrado');
    status.textContent = 'Procesando métricas...';
    const ab = await r.arrayBuffer();
    init(ab);
  } catch (e) {
    status.innerHTML = '⚠ Coloca <strong>datos.xlsx</strong> en la raíz del repositorio';
    status.style.color = '#ff5555';
  }
};

function init(buffer) {
  const wb   = XLSX.read(buffer, { type: 'array', cellDates: true });
  const data = parseWorkbook(wb);
  if (!data.weeks.length) {
    document.getElementById('load-status').textContent = 'Error: No se encontraron hojas "Semana X"';
    return;
  }
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
  buildTabs(data);
}

function parseWorkbook(wb) {
  const weeks = [];
  wb.SheetNames.forEach(name => {
    const m = name.match(/semana\s*(\d+)/i);
    if (!m) return;
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: '' });
    const hRow = rows.findIndex(r => r.some(c => String(c).toLowerCase().includes('tiktok')));
    if (hRow < 0) return;
    const h  = rows[hRow].map(c => String(c).toLowerCase());
    const ci = {
      tik: h.findIndex(c => c.includes('tiktok')),
      ig:  h.findIndex(c => c.includes('instagram')),
      fb:  h.findIndex(c => c.includes('facebook')),
      yt:  h.findIndex(c => c.includes('youtube'))
    };
    const accounts = [];
    for (let i = hRow + 2; i < rows.length; i++) {
      const rawName = String(rows[i][0] || '').trim();
      if (!rawName || /total|bono/i.test(rawName)) continue;
      const vals = {
        TikTok:    pn(rows[i][ci.tik]),
        Instagram: pn(rows[i][ci.ig]),
        Facebook:  pn(rows[i][ci.fb]),
        YouTube:   pn(rows[i][ci.yt])
      };
      const total = Object.values(vals).reduce((a, b) => a + b, 0);
      accounts.push({ name: rawName, ...vals, total });
    }
    weeks.push({ num: parseInt(m[1]), accounts });
  });
  return { weeks: weeks.sort((a, b) => a.num - b.num) };
}

function pn(v) {
  const n = parseFloat(String(v).replace(/[^0-9.-]/g, ''));
  return isNaN(n) ? 0 : n;
}

function buildTabs(data) {
  const tabBar = document.getElementById('tabs');
  tabBar.innerHTML = '';
  const res = buildResumen(data.weeks);

  function addTab(label, fn, active = false) {
    const btn = document.createElement('button');
    btn.className = 'tab' + (active ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      fn();
    };
    tabBar.appendChild(btn);
  }

  addTab('Resumen mensual', () => renderResumen(res, data.weeks), true);
  data.weeks.forEach(w => addTab('Semana ' + w.num, () => renderSemana(w, data.weeks)));
  renderResumen(res, data.weeks);
}

function buildResumen(weeks) {
  const res = {};
  weeks.forEach((w, i) => {
    w.accounts.forEach(a => {
      if (!res[a.name]) res[a.name] = { total: 0, history: Array(weeks.length).fill(0), byPlat: { TikTok: 0, Instagram: 0, Facebook: 0, YouTube: 0 } };
      res[a.name].total += a.total;
      res[a.name].history[i] = a.total;
      PLATS.forEach(p => { res[a.name].byPlat[p] += a[p]; });
    });
  });
  return res;
}

function clearCharts() {
  chartInstances.forEach(c => { try { c.destroy(); } catch (e) {} });
  chartInstances = [];
}

const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: false,
  interaction: { mode: 'index', intersect: false },
  plugins: {
    legend: {
      labels: {
        color: '#5c5875',
        font: { family: 'DM Mono', size: 10 },
        usePointStyle: true, pointStyleWidth: 8, boxHeight: 6
      }
    },
    tooltip: {
      backgroundColor: '#13131e',
      borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
      titleColor: '#ddd8f0', bodyColor: '#5c5875',
      titleFont: { family: 'Clash Display', size: 12, weight: '700' },
      bodyFont: { family: 'DM Mono', size: 11 }, padding: 12,
      callbacks: { label: ctx => `  ${ctx.dataset.label}: ${fmt(ctx.parsed.y)}` }
    }
  },
  scales: {
    x: {
      grid: { color: 'rgba(255,255,255,0.04)' },
      ticks: { color: '#5c5875', font: { family: 'DM Mono', size: 10 } }
    },
    y: {
      grid: { color: 'rgba(255,255,255,0.04)' },
      ticks: { color: '#5c5875', font: { family: 'DM Mono', size: 10 }, callback: v => fmtShort(v) },
      border: { dash: [4, 4] }
    }
  }
};

function renderResumen(res, weeks) {
  clearCharts();
  const names   = Object.keys(res);
  const grand   = names.reduce((s, n) => s + res[n].total, 0);
  const platTot = { TikTok: 0, Instagram: 0, Facebook: 0, YouTube: 0 };
  names.forEach(n => PLATS.forEach(p => { platTot[p] += res[n].byPlat[p]; }));
  const sorted = [...names].sort((a, b) => res[b].total - res[a].total);

  document.getElementById('main').innerHTML = `
  <div class="metrics-grid anim">
    <div class="card hero">
      <div class="card-label">Alcance total del mes</div>
      <div class="card-val">${fmt(grand)}</div>
    </div>
    ${PLATS.map(p => `
    <div class="card" data-plat="${p}">
      <div class="card-label">${p}</div>
      <div class="card-val" style="font-size:1.5rem;color:${PCOLORS[p]}">${fmt(platTot[p])}</div>
    </div>`).join('')}
  </div>

  <div class="charts-row anim anim-d1">
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Evolución semanal por cuenta</span></div>
      <div class="chart-wrap"><canvas id="chart-lineas"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Mix de plataformas</span></div>
      <div class="chart-wrap"><canvas id="chart-donut"></canvas></div>
    </div>
  </div>

  <div class="charts-row anim anim-d2">
    <div class="panel" style="grid-column:1/-1">
      <div class="panel-header"><span class="panel-title">Top performers del mes</span></div>
      <table class="top-table">
        <thead>
          <tr>
            <th>#</th><th>Cuenta</th>
            <th style="text-align:right">Alcance total</th>
            <th style="text-align:right">% del total</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.slice(0, 8).map((n, i) => `
          <tr class="rank-${i + 1}">
            <td><span class="rank-num">${i + 1}</span></td>
            <td style="font-size:12px">${n}</td>
            <td style="text-align:right;font-family:var(--display);font-size:1.1rem;color:var(--lime)">${fmt(res[n].total)}</td>
            <td style="text-align:right;color:var(--muted);font-size:11px">${((res[n].total / grand) * 100).toFixed(1)}%</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;

  const lineChart = new Chart(document.getElementById('chart-lineas').getContext('2d'), {
    type: 'line',
    data: {
      labels: weeks.map(w => 'Sem ' + w.num),
      datasets: names.map((n, i) => ({
        label: n,
        data: res[n].history,
        borderColor: ACC_COLORS[i % ACC_COLORS.length],
        backgroundColor: ACC_COLORS[i % ACC_COLORS.length] + '18',
        fill: false, tension: 0.4, borderWidth: 2,
        pointRadius: 4, pointHoverRadius: 6,
        pointBackgroundColor: ACC_COLORS[i % ACC_COLORS.length]
      }))
    },
    options: { ...CHART_DEFAULTS }
  });
  chartInstances.push(lineChart);

  const donutChart = new Chart(document.getElementById('chart-donut').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: PLATS,
      datasets: [{
        data: PLATS.map(p => platTot[p]),
        backgroundColor: PLATS.map(p => PCOLORS[p] + 'cc'),
        borderColor: PLATS.map(p => PCOLORS[p]),
        borderWidth: 2, hoverOffset: 8
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '70%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#5c5875', font: { family: 'DM Mono', size: 10 }, usePointStyle: true, pointStyleWidth: 8, boxHeight: 6, padding: 14 }
        },
        tooltip: {
          backgroundColor: '#13131e', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
          titleColor: '#ddd8f0', bodyColor: '#5c5875',
          titleFont: { family: 'Clash Display', size: 12, weight: '700' },
          bodyFont: { family: 'DM Mono', size: 11 }, padding: 12,
          callbacks: { label: ctx => `  ${fmt(ctx.parsed)} (${((ctx.parsed / grand) * 100).toFixed(1)}%)` }
        }
      }
    }
  });
  chartInstances.push(donutChart);
}

function renderSemana(w, allWeeks) {
  clearCharts();
  const platTot = { TikTok: 0, Instagram: 0, Facebook: 0, YouTube: 0 };
  w.accounts.forEach(a => PLATS.forEach(p => { platTot[p] += a[p]; }));
  const total  = Object.values(platTot).reduce((a, b) => a + b, 0);
  const sorted = [...w.accounts].sort((a, b) => b.total - a.total);

  document.getElementById('main').innerHTML = `
  <div class="week-header anim">
    <span class="week-badge">Semana ${w.num}</span>
    <span style="color:var(--muted);font-size:11px">${w.accounts.length} cuentas activas</span>
  </div>

  <div class="metrics-grid anim">
    <div class="card hero">
      <div class="card-label">Alcance total semana</div>
      <div class="card-val">${fmt(total)}</div>
    </div>
    ${PLATS.map(p => `
    <div class="card" data-plat="${p}">
      <div class="card-label">${p}</div>
      <div class="card-val" style="font-size:1.4rem;color:${PCOLORS[p]}">${fmt(platTot[p])}</div>
    </div>`).join('')}
  </div>

  <div class="charts-row anim anim-d1">
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Alcance por cuenta</span></div>
      <div class="chart-wrap"><canvas id="chart-cuentas"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Distribución por plataforma</span></div>
      <div class="chart-wrap"><canvas id="chart-plat"></canvas></div>
    </div>
  </div>

  <div class="panel anim anim-d2">
    <div class="panel-header"><span class="panel-title">Detalle por cuenta</span></div>
    <div class="acc-grid">
      ${sorted.map(a => {
        const platMax = Math.max(...PLATS.map(p => a[p]), 1);
        return `
        <div class="acc-card">
          <div class="acc-name">${a.name}</div>
          <div class="acc-total">${fmt(a.total)}</div>
          <div class="plat-bars">
            ${PLATS.map(p => `
            <div class="plat-row">
              <div class="plat-name">${p}</div>
              <div class="plat-bar-bg">
                <div class="plat-bar-fill" style="width:${a[p] ? (a[p] / platMax * 100) : 0}%;background:${PCOLORS[p]}"></div>
              </div>
              <div class="plat-val">${fmtShort(a[p])}</div>
            </div>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  const cuentasChart = new Chart(document.getElementById('chart-cuentas').getContext('2d'), {
    type: 'bar',
    data: {
      labels: sorted.map(a => a.name),
      datasets: [{
        label: 'Alcance',
        data: sorted.map(a => a.total),
        backgroundColor: sorted.map((_, i) => ACC_COLORS[i % ACC_COLORS.length] + 'bb'),
        borderColor:     sorted.map((_, i) => ACC_COLORS[i % ACC_COLORS.length]),
        borderWidth: 1.5, borderRadius: 6, borderSkipped: false
      }]
    },
    options: {
      ...CHART_DEFAULTS,
      plugins: { ...CHART_DEFAULTS.plugins, legend: { display: false } },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#5c5875', font: { family: 'DM Mono', size: 9 }, maxRotation: 35 }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#5c5875', font: { family: 'DM Mono', size: 10 }, callback: v => fmtShort(v) },
          border: { dash: [4, 4] }
        }
      }
    }
  });
  chartInstances.push(cuentasChart);

  const platChart = new Chart(document.getElementById('chart-plat').getContext('2d'), {
    type: 'polarArea',
    data: {
      labels: PLATS,
      datasets: [{
        data: PLATS.map(p => platTot[p]),
        backgroundColor: PLATS.map(p => PCOLORS[p] + '99'),
        borderColor: PLATS.map(p => PCOLORS[p]),
        borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#5c5875', font: { family: 'DM Mono', size: 10 }, usePointStyle: true, pointStyleWidth: 8, boxHeight: 6, padding: 14 }
        },
        tooltip: {
          backgroundColor: '#13131e', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
          titleColor: '#ddd8f0', bodyColor: '#5c5875',
          titleFont: { family: 'Clash Display', size: 12, weight: '700' },
          bodyFont: { family: 'DM Mono', size: 11 }, padding: 12,
          callbacks: { label: ctx => `  ${fmt(ctx.parsed.r)}` }
        }
      },
      scales: {
        r: {
          grid: { color: 'rgba(255,255,255,0.06)' },
          ticks: { display: false, backdropColor: 'transparent' }
        }
      }
    }
  });
  chartInstances.push(platChart);
}

function fmt(n) {
  return Math.round(n).toLocaleString('es-AR');
}
function fmtShort(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'K';
  return Math.round(n).toString();
}
</script>
