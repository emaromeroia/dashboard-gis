<head>

<title>GIS · MULTICUENTAS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #050508; --surface: #0c0c12; --border: rgba(255,255,255,0.06);
  --text: #e8e4f0; --muted: #5a5870; --lime: #b8ff3c; --radius: 16px;
  --tiktok: #3cf0ff; --ig: #ff60c0; --fb: #60ffb0; --yt: #ffb840;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; overflow-x: hidden; }

/* Animaciones de Entrada */
@keyframes reveal { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.animate-reveal { animation: reveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }

.bg-glow { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
.bg-glow-1 { width: 600px; height: 400px; background: rgba(184,255,60,0.05); top: -100px; left: -200px; }

#loading-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; position: relative; }

.topbar { 
  padding: 1.2rem 2rem; border-bottom: 1px solid var(--border); 
  display: flex; justify-content: space-between; align-items: center; 
  position: sticky; top: 0; background: rgba(5,5,8,0.95); backdrop-filter: blur(20px); z-index: 100; 
}
.tab-bar { display: flex; gap: 5px; padding: 0.5rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab { padding: 12px 20px; color: var(--muted); border: none; background: none; cursor: pointer; font-family: inherit; font-size: 11px; text-transform: uppercase; transition: 0.3s; white-space: nowrap; }
.tab.active { color: var(--lime); font-weight: 700; border-bottom: 2px solid var(--lime); }

.content { padding: 2rem; max-width: 1400px; margin: 0 auto; z-index: 1; position: relative; }

/* Metrics & Interaction */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 2rem; }
.card { 
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); 
  padding: 1.8rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
  position: relative; overflow: hidden;
}
.card:hover { transform: scale(1.03); border-color: rgba(184,255,60,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.hero { border-left: 5px solid var(--lime); background: linear-gradient(135deg, rgba(184,255,60,0.07), transparent); }

.val { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -1px; }
.hero .val { color: var(--lime); text-shadow: 0 0 25px rgba(184,255,60,0.4); }

.panel { background: rgba(18,18,26,0.5); border: 1px solid var(--border); border-radius: var(--radius); padding: 25px; margin-bottom: 1.5rem; backdrop-filter: blur(10px); }
.chart-container { position: relative; height: 350px; width: 100%; }

.acc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }

@media (max-width: 768px) {
  .content { padding: 1rem; }
  .val { font-size: 26px; }
  .topbar { padding: 1rem; }
  .metrics-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="bg-glow bg-glow-1"></div>
<div id="loading-screen">

    <h2 style="font-family:'Syne'; font-weight:800; letter-spacing: 2px;">MULTICUENTAS</h2>
    <p id="status" style="color:var(--muted); font-size:11px; margin-top:10px;">Sincronizando base de datos...</p>
</div>

<div id="dash" style="display:none">
    <div class="topbar">
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="width:10px; height:10px; border-radius:50%; background:var(--lime); box-shadow:0 0 15px var(--lime);"></div>
            <div style="font-family:'Syne'; font-weight:800; font-size:1.2rem; letter-spacing:1px;">GIS · MULTICUENTAS</div>
        </div>
        <button onclick="location.reload()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:8px 16px; border-radius:8px; cursor:pointer; font-size:10px; font-weight:700;">ACTUALIZAR</button>
    </div>
    <div class="tab-bar" id="tabs"></div>
    <div class="content" id="main"></div>
</div>
