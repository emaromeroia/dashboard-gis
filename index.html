<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINCRO GIS · Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --card: #121217;
            --card-hover: #181820;
            --border: rgba(255, 255, 255, 0.06);
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --accent: #b8ff3c;
            --accent-soft: rgba(184, 255, 60, 0.1);
            
            /* Account Colors */
            --c-clips: #ff60c0;
            --c-realestate: #ffeb3b;
            --c-inversiones: #3b82f6;
            --c-business: #22c55e;
            
            /* Social Colors */
            --tiktok: #25f4ee;
            --instagram: #ff60c0;
            --facebook: #1877f2;
            --youtube: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text-primary); 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }

        /* Brand Background */
        .brand-watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40vw; height: 40vw; background: url('logo_oso.jpg') center/contain no-repeat;
            opacity: 0.03; filter: blur(4px); z-index: -1; pointer-events: none;
        }

        /* Layout */
        .nav-header {
            height: 64px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem; position: sticky; top: 0;
            background: rgba(9, 9, 11, 0.8); backdrop-filter: blur(12px); z-index: 50;
        }

        .logo { font-weight: 700; letter-spacing: -0.02em; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--text-secondary); font-weight: 400; }

        .tabs { 
            display: flex; gap: 1.5rem; padding: 0 2rem; background: var(--bg);
            border-bottom: 1px solid var(--border); overflow-x: auto;
        }
        .tab {
            padding: 1rem 0; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
            color: var(--text-secondary); border: none; background: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.05em; transition: 0.2s;
            border-bottom: 2px solid transparent; position: relative; top: 1px;
        }
        .tab:hover { color: var(--text-primary); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        main { max-width: 1400px; margin: 0 auto; padding: 2.5rem 2rem; display: grid; gap: 2rem; }

        /* KPI Section */
        .kpi-grid { display: grid; grid-template-columns: 1.5fr repeat(4, 1fr); gap: 1rem; }
        
        .kpi-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 1.5rem; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .kpi-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
        
        .kpi-card.primary { background: linear-gradient(to bottom right, #18181b, #09090b); border-color: var(--accent-soft); }
        .kpi-card.primary .value { font-size: 2.5rem; color: var(--accent); letter-spacing: -0.03em; }
        
        .kpi-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .kpi-card .value { font-size: 1.5rem; font-weight: 700; }

        /* Visual distinction by account type */
        .card-clips { border-left: 3px solid var(--c-clips); }
        .card-realestate { border-left: 3px solid var(--c-realestate); }
        .card-inversiones { border-left: 3px solid var(--c-inversiones); }
        .card-business { border-left: 3px solid var(--c-business); }

        /* Main Dashboard Grid */
        .dashboard-grid { display: grid; grid-template-columns: 8fr 4fr; gap: 1.5rem; }
        
        .panel { 
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;
        }
        .panel-header { display: flex; justify-content: space-between; align-items: baseline; }
        .panel-title { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }
        .insight { font-size: 0.75rem; color: var(--accent); font-weight: 500; }

        .chart-wrap { position: relative; height: 320px; width: 100%; }

        /* Bono Trophy */
        .bono-banner {
            grid-column: span 2; background: var(--accent-soft); border: 1px solid var(--accent);
            border-radius: 12px; padding: 1.25rem 2rem; display: flex; align-items: center; gap: 1.5rem;
            animation: fadeIn 0.6s ease-out;
        }
        .bono-txt h4 { font-size: 0.75rem; text-transform: uppercase; color: var(--accent); margin-bottom: 2px; }
        .bono-txt p { font-size: 1.1rem; font-weight: 700; }

        /* Utility */
        .refresh-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--text-primary);
            padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.75rem; cursor: pointer; transition: 0.2s;
        }
        .refresh-btn:hover { background: var(--text-primary); color: var(--bg); }

        #loader { 
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
        }
        .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1024px) {
            .kpi-grid { grid-template-columns: 1fr; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="brand-watermark"></div>
    
    <div id="loader">
        <div class="spinner"></div>
        <p style="font-size: 0.8rem; font-family: 'JetBrains Mono'; color: var(--text-secondary);">SINCRO_DATA_INITIALIZING...</p>
    </div>

    <nav class="nav-header">
        <div class="logo">GIS <span>/ MULTICUENTAS</span></div>
        <button class="refresh-btn" onclick="location.reload()">Refresh Data</button>
    </nav>

    <div class="tabs" id="tab-container"></div>

    <main id="main-content" style="visibility: hidden;">
        <section class="kpi-grid" id="kpi-section"></section>

        <div id="bono-container"></div>

        <section class="dashboard-grid">
            <div class="panel">
                <div class="panel-header">
                    <h3 class="panel-title">Growth Analytics</h3>
                    <div class="insight" id="growth-insight"></div>
                </div>
                <div class="chart-wrap">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <h3 class="panel-title">Market Share</h3>
                </div>
                <div class="chart-wrap">
                    <canvas id="donutChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script>
        const CONFIG = {
            colors: {
                clips: '#ff60c0',
                realestate: '#ffeb3b',
                inversiones: '#3b82f6',
                business: '#22c55e',
                total: '#b8ff3c'
            },
            social: ['#25f4ee', '#ff60c0', '#1877f2', '#ff0000']
        };

        let db = { weeks: [], summary: {} };
        let charts = {};

        window.onload = async () => {
            try {
                const res = await fetch('datos.xlsx?v=' + Date.now());
                const buf = await res.arrayBuffer();
                const wb = XLSX.read(buf, {type:'array', cellDates:true});
                processData(wb);
                initUI();
            } catch(e) {
                document.getElementById('loader').innerHTML = '<p style="color:#ef4444">Error loading data. Ensure datos.xlsx exists.</p>';
            }
        };

        function processData(wb) {
            wb.SheetNames.forEach(name => {
                const match = name.match(/semana\s*(\d+)/i);
                if(!match) return;
                
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], {header:1, defval:0});
                const hIdx = rows.findIndex(r => r.some(c => String(c).toLowerCase().includes('tiktok')));
                if(hIdx < 0) return;

                const weekData = { num: match[1], accounts: [], bono: null };
                
                for(let i = hIdx + 1; i < rows.length; i++) {
                    const label = String(rows[i][0] || '').trim();
                    if(!label || /total|fecha|link|2026/i.test(label)) continue;

                    if(/bono/i.test(label)) {
                        if(match[1] == "1") weekData.bono = { user: "@giselarojas.inversiones", amt: "$50" };
                        continue;
                    }

                    if(label.includes('@')) {
                        const type = label.split('.').pop();
                        const metrics = [rows[i][1], rows[i][2], rows[i][3], rows[i][4]].map(v => parseFloat(v) || 0);
                        const total = parseFloat(rows[i][5]) || metrics.reduce((a,b)=>a+b, 0);
                        
                        weekData.accounts.push({ name: label, type, total, tiktok: metrics[0], ig: metrics[1], fb: metrics[2], yt: metrics[3] });
                        
                        if(!db.summary[label]) db.summary[label] = { type, total: 0, history: [] };
                        db.summary[label].total += total;
                        db.summary[label].history.push(total);
                    }
                }
                db.weeks.push(weekData);
            });
            db.weeks.sort((a,b) => a.num - b.num);
        }

        function initUI() {
            const tabs = document.getElementById('tab-container');
            const addTab = (id, label, active = false) => {
                const btn = document.createElement('button');
                btn.className = `tab ${active ? 'active' : ''}`;
                btn.innerText = label;
                btn.onclick = (e) => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    renderView(id);
                };
                tabs.appendChild(btn);
            };

            addTab('resumen', 'Resumen Mensual', true);
            db.weeks.forEach(w => addTab(w.num, `Semana ${w.num}`));

            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.visibility = 'visible';
            renderView('resumen');
        }

        function renderView(viewId) {
            const kpiSection = document.getElementById('kpi-section');
            const bonoSection = document.getElementById('bono-container');
            kpiSection.innerHTML = '';
            bonoSection.innerHTML = '';
            
            if(viewId === 'resumen') {
                const totalMes = Object.values(db.summary).reduce((a,b) => a + b.total, 0);
                kpiSection.innerHTML = `<div class="kpi-card primary"><div class="kpi-label">Total Views Mes</div><div class="value">${fmt(totalMes)}</div></div>`;
                
                Object.entries(db.summary).forEach(([name, data]) => {
                    kpiSection.innerHTML += `
                        <div class="kpi-card card-${data.type}">
                            <div class="kpi-label">${name}</div>
                            <div class="value">${fmt(data.total)}</div>
                        </div>`;
                });
                renderCharts('resumen');
            } else {
                const week = db.weeks.find(w => w.num == viewId);
                const totalW = week.accounts.reduce((a,b) => a + b.total, 0);
                kpiSection.innerHTML = `<div class="kpi-card primary"><div class="kpi-label">Total Semana ${viewId}</div><div class="value">${fmt(totalW)}</div></div>`;
                
                week.accounts.forEach(acc => {
                    kpiSection.innerHTML += `
                        <div class="kpi-card card-${acc.type}">
                            <div class="kpi-label">${acc.name}</div>
                            <div class="value">${fmt(acc.total)}</div>
                        </div>`;
                });

                if(week.bono) {
                    bonoSection.innerHTML = `
                        <div class="bono-banner">
                            <span style="font-size: 1.5rem">🏆</span>
                            <div class="bono-txt">
                                <h4>Bono Semanal</h4>
                                <p>${week.bono.user} ha ganado ${week.bono.amt}</p>
                            </div>
                        </div>`;
                }
                renderCharts(viewId);
            }
        }

        function renderCharts(viewId) {
            Object.values(charts).forEach(c => c.destroy());
            const ctxMain = document.getElementById('mainChart').getContext('2d');
            const ctxDonut = document.getElementById('donutChart').getContext('2d');

            if(viewId === 'resumen') {
                const labels = db.weeks.map(w => `Sem ${w.num}`);
                const datasets = Object.entries(db.summary).map(([name, data]) => ({
                    label: name,
                    data: data.history,
                    borderColor: CONFIG.colors[data.type],
                    tension: 0.4,
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 4
                }));

                charts.main = new Chart(ctxMain, {
                    type: 'line',
                    data: { labels, datasets },
                    options: chartTheme(true)
                });

                const donutData = Object.entries(db.summary).sort((a,b) => b[1].total - a[1].total);
                const topAcc = donutData[0];
                const pct = ((topAcc[1].total / Object.values(db.summary).reduce((a,b)=>a+b.total,0))*100).toFixed(0);
                document.getElementById('growth-insight').innerText = `${topAcc[0]} domina con ${pct}% de participación`;

                charts.donut = new Chart(ctxDonut, {
                    type: 'doughnut',
                    data: {
                        labels: donutData.map(d => d[0]),
                        datasets: [{
                            data: donutData.map(d => d[1].total),
                            backgroundColor: donutData.map(d => CONFIG.colors[d[1].type]),
                            borderWidth: 0,
                            hoverOffset: 10
                        }]
                    },
                    options: donutTheme()
                });
            } else {
                // Weekly Distribution View
                const week = db.weeks.find(w => w.num == viewId);
                const platforms = ['TikTok', 'Instagram', 'Facebook', 'YouTube'];
                const platTotals = [0,0,0,0];
                week.accounts.forEach(a => {
                    platTotals[0] += a.tiktok; platTotals[1] += a.ig;
                    platTotals[2] += a.fb; platTotals[3] += a.yt;
                });

                charts.main = new Chart(ctxMain, {
                    type: 'bar',
                    data: {
                        labels: week.accounts.map(a => a.name.split('.')[1]),
                        datasets: [{
                            data: week.accounts.map(a => a.total),
                            backgroundColor: week.accounts.map(a => CONFIG.colors[a.type]),
                            borderRadius: 6
                        }]
                    },
                    options: chartTheme(false)
                });

                charts.donut = new Chart(ctxDonut, {
                    type: 'doughnut',
                    data: {
                        labels: platforms,
                        datasets: [{
                            data: platTotals,
                            backgroundColor: CONFIG.social,
                            borderWidth: 0
                        }]
                    },
                    options: donutTheme()
                });
            }
        }

        function chartTheme(isLine) {
            return {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false },
                        ticks: { color: '#71717a', font: { size: 10 } }
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#71717a', font: { size: 10 }, maxRotation: 0 }
                    }
                },
                plugins: {
                    legend: { display: isLine, position: 'top', align: 'end', labels: { color: '#a1a1aa', boxWidth: 8, usePointStyle: true, font: { size: 10 } } },
                    tooltip: { backgroundColor: '#18181b', titleColor: '#fafafa', bodyColor: '#a1a1aa', padding: 12, cornerRadius: 8, borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1 }
                }
            };
        }

        function donutTheme() {
            return {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '75%',
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#a1a1aa', boxWidth: 8, usePointStyle: true, font: { size: 10 } } }
                }
            };
        }

        function fmt(n) { return Math.round(n).toLocaleString('es-AR'); }
    </script>
</body>
</html>
