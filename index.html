<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS · Quantum Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@300;400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #050508; --surface: #0c0c12; --border: rgba(255,255,255,0.06);
  --text: #e8e4f0; --muted: #5a5870; --lime: #b8ff3c; --radius: 14px;
  --tiktok: #3cf0ff; --ig: #ff60c0; --fb: #60ffb0; --yt: #ffb840;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; overflow-x: hidden; }
.bg-glow { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
.bg-glow-1 { width: 600px; height: 400px; background: rgba(184,255,60,0.04); top: -100px; left: -200px; }
#loading-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 1; }
.topbar { padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(5,5,8,0.92); backdrop-filter: blur(20px); z-index: 100; }
.tab-bar { display: flex; gap: 5px; padding: 0 2rem; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
.tab { padding: 13px 20px; color: var(--muted); border: none; background: none; cursor: pointer; font-family: inherit; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid transparent; transition: 0.2s; }
.tab.active { color: var(--lime); border-bottom-color: var(--lime); }
.content { padding: 2rem; position: relative; z-index: 1; }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 2rem; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; position: relative; }
.hero { border-left: 4px solid var(--lime); background: linear-gradient(135deg, rgba(184,255,60,0.05), transparent); }
.val { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; line-height: 1; }
.hero .val { color: var(--lime); text-shadow: 0 0 20px rgba(184,255,60,0.4); }
.acc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
.panel { background: rgba(18,18,26,0.6); backdrop-filter: blur(14px); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<div class="bg-glow bg-glow-1"></div>
<div id="loading-screen">
    <div style="font-size: 3rem; margin-bottom: 1rem;">📊</div>
    <h2 style="font-family:'Syne'">Quantum Live</h2>
    <p id="status" style="color:var(--muted); font-size:10px">Sincronizando datos...</p>
</div>
<div id="dash" style="display:none">
    <div class="topbar">
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="width:8px; height:8px; border-radius:50%; background:var(--lime); box-shadow:0 0 10px var(--lime);"></div>
            <div style="font-family:'Syne'; font-weight:800">GIS · QUANTUM</div>
        </div>
        <button onclick="location.reload()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:5px 12px; border-radius:5px; cursor:pointer; font-size:10px">RECARGAR</button>
    </div>
    <div class="tab-bar" id="tabs"></div>
    <div class="content" id="main"></div>
</div>
<script>
const PLATS = ['TikTok','Instagram','Facebook','YouTube'];
const COLORS = ['#b8ff3c','#3cf0ff','#ff60c0','#60ffb0','#ffb840'];
let charts = [];

window.onload = async () => {
    try {
        const r = await fetch('datos.xlsx');
        if(!r.ok) throw new Error();
        const ab = await r.arrayBuffer();
        start(ab);
    } catch(e) {
        document.getElementById('status').innerHTML = "Error: No se encontró 'datos.xlsx' en el servidor.";
    }
};

function start(buffer) {
    const wb = XLSX.read(buffer, {type:'array', cellDates:true});
    const data = parse(wb);
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    render(data);
}

function parse(wb) {
    const weeks = [];
    wb.SheetNames.forEach(n => {
        const m = n.match(/semana\s*(\d+)/i);
        if(!m) return;
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[n], {header:1, defval:''});
        let hRow = rows.findIndex(r => r.some(c => String(c).toLowerCase().includes('tiktok')));
        if(hRow < 0) return;
        const h = rows[hRow].map(c => String(c).toLowerCase());
        const ci = { tik: h.indexOf('tiktok'), ig: h.indexOf('instagram'), fb: h.indexOf('facebook'), yt: h.indexOf('youtube') };
        const accs = [];
        for(let i=hRow+2; i<rows.length; i++){
            const name = String(rows[i][0] || '').trim();
            if(!name || /total|bono/i.test(name)) continue;
            const v = { TikTok:pn(rows[i][ci.tik]), Instagram:pn(rows[i][ci.ig]), Facebook:pn(rows[i][ci.fb]), YouTube:pn(rows[i][ci.yt]) };
            accs.push({ name, ...v, total: Object.values(v).reduce((a,b)=>a+b,0) });
        }
        weeks.push({ num: parseInt(m[1]), accounts: accs });
    });
    return { weeks: weeks.sort((a,b)=>a.num-b.num) };
}

function pn(v) { const n = parseFloat(String(v).replace(/[^0-9.-]/g, '')); return isNaN(n)?0:n; }

function render(data) {
    const container = document.getElementById('tabs');
    container.innerHTML = '';
    const res = buildRes(data.weeks);
    const addTab = (lbl, fn, active=false) => {
        const b = document.createElement('button');
        b.className = 'tab' + (active?' active':'');
        b.textContent = lbl;
        b.onclick = () => { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); b.classList.add('active'); fn(); };
        container.appendChild(b);
    };
    addTab('Resumen Mensual', () => showRes(res, data.weeks), true);
    data.weeks.forEach(w => addTab('Semana '+w.num, () => showWeek(w)));
    showRes(res, data.weeks);
}

function buildRes(weeks) {
    const res = {};
    weeks.forEach((w, i) => w.accounts.forEach(a => {
        if(!res[a.name]) res[a.name] = { total: 0, history: Array(weeks.length).fill(0) };
        res[a.name].total += a.total; res[a.name].history[i] = a.total;
    }));
    return res;
}

function showRes(res, weeks) {
    clear();
    const names = Object.keys(res);
    const grand = names.reduce((s,n)=>s+res[n].total,0);
    let h = `<div class="metrics-grid"><div class="card hero"><div style="font-size:9px;color:var(--muted)">MES TOTAL</div><div class="val">${fmt(grand)}</div></div>`;
    names.slice(0,3).forEach((n,i) => h += `<div class="card"><div style="font-size:9px;color:var(--muted)">${n}</div><div class="val" style="font-size:20px">${fmt(res[n].total)}</div></div>`);
    h += `</div><div class="panel" style="height:300px"><canvas id="c1"></canvas></div><div class="panel" style="height:300px"><canvas id="c2"></canvas></div>`;
    document.getElementById('main').innerHTML = h;
    new Chart(document.getElementById('c1'), { type:'line', data:{ labels:weeks.map(w=>'S'+w.num), datasets: names.map((n,i)=>({label:n, data:res[n].history, borderColor:COLORS[i%5], tension:0.4})) }, options: { responsive:true, maintainAspectRatio:false }});
    new Chart(document.getElementById('c2'), { type:'bar', data:{ labels:names, datasets:[{label:'Total', data:names.map(n=>res[n].total), backgroundColor:COLORS}] }, options:{indexAxis:'y', responsive:true, maintainAspectRatio:false}});
}

function showWeek(w) {
    clear();
    const totals = {TikTok:0, Instagram:0, Facebook:0, YouTube:0};
    w.accounts.forEach(a => PLATS.forEach(p => totals[p] += a[p]));
    const total = Object.values(totals).reduce((a,b)=>a+b,0);
    let h = `<div class="metrics-grid"><div class="card hero"><div style="font-size:9px;color:var(--muted)">SEMANA ${w.num}</div><div class="val">${fmt(total)}</div></div>`;
    PLATS.forEach(p => h += `<div class="card"><div style="font-size:9px;color:var(--muted)">${p}</div><div class="val" style="font-size:18px">${fmt(totals[p])}</div></div>`);
    h += `</div><div class="acc-grid">`;
    w.accounts.forEach(a => h += `<div class="card"><div style="font-weight:700;margin-bottom:8px;font-size:11px">${a.name}</div><div class="val" style="color:var(--lime);font-size:20px">${fmt(a.total)}</div></div>`);
    h += `</div>`;
    document.getElementById('main').innerHTML = h;
}

function fmt(n) { return Math.round(n).toLocaleString('es-AR'); }
function clear() { charts.forEach(c=>c.destroy()); charts = []; }
</script>
</body>
</html>
