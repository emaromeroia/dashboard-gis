<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS · MULTICUENTAS NEON</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root {
            --bg: #030305;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f5;
            --text-dim: #9494a5;
            --lime: #b8ff3c;
            /* Account Colors */
            --c-clips: #ff60c0; --c-realestate: #ffeb3b; --c-inversiones: #1877F2; --c-business: #4CAF50;
            /* Social Colors */
            --tiktok: #3cf0ff; --instagram: #ff60c0; --facebook: #1877f2; --youtube: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif;
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, rgba(157, 80, 255, 0.1), transparent 50%);
        }

        .bg-logo {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40vw; height: 40vw; background: url('logo_oso.jpg') center/contain no-repeat;
            opacity: 0.04; filter: blur(6px); z-index: -1;
        }

        nav {
            height: 70px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2.5rem; background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
        }

        .tabs { display: flex; gap: 2rem; padding: 0 2.5rem; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        .tab {
            padding: 1.2rem 0; font-family: 'JetBrains Mono'; font-size: 0.7rem;
            color: var(--text-dim); border: none; background: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab.active { color: var(--text-main); border-bottom-color: var(--lime); }

        main { max-width: 1400px; margin: 0 auto; padding: 2.5rem; }
        .kpi-grid { display: grid; grid-template-columns: 1.5fr repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }

        .card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            padding: 1.5rem; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }

        .primary-card { border-top: 4px solid var(--lime); background: linear-gradient(180deg, rgba(184,255,60,0.05), transparent); }
        .card-clips { border-top: 4px solid var(--c-clips); }
        .card-realestate { border-top: 4px solid var(--c-realestate); }
        .card-inversiones { border-top: 4px solid var(--c-inversiones); }
        .card-business { border-top: 4px solid var(--c-business); }

        .val { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
        .card-clips .val { color: var(--c-clips); } .card-realestate .val { color: var(--c-realestate); }
        .card-inversiones .val { color: var(--c-inversiones); } .card-business .val { color: var(--c-business); }

        .panel-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
        .chart-wrap { position: relative; height: 300px; width: 100%; }

        .bono-banner {
            background: linear-gradient(90deg, rgba(184, 255, 60, 0.1), transparent);
            border: 1px solid rgba(184, 255, 60, 0.3); border-radius: 16px;
            padding: 1.5rem 2rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 20px;
        }

        @media (max-width: 1000px) { .kpi-grid, .panel-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-logo"></div>
    <div id="loader" style="position:fixed;inset:0;background:#030305;z-index:1000;display:flex;align-items:center;justify-content:center;color:var(--lime);font-family:'JetBrains Mono';font-size:12px;">SINCRO_DATA...</div>

    <nav>
        <div style="font-weight:800; letter-spacing:2px;">GIS <span style="color:var(--text-dim);font-weight:400;">/ MULTICUENTAS</span></div>
        <button onclick="location.reload()" style="background:none;border:1px solid var(--border);color:var(--text-dim);padding:8px 16px;border-radius:8px;font-size:10px;cursor:pointer;">REFRESCAR</button>
    </nav>
    <div class="tabs" id="tabs"></div>

    <main id="content" style="display:none;">
        <div id="bono-area"></div>
        <div class="kpi-grid" id="kpi-grid"></div>
        <div class="panel-grid">
            <div class="card"><div style="font-size:10px;color:var(--text-dim);margin-bottom:20px;text-transform:uppercase;">Evolución de Alcance</div><div class="chart-wrap"><canvas id="mainChart"></canvas></div></div>
            <div class="card"><div style="font-size:10px;color:var(--text-dim);margin-bottom:20px;text-transform:uppercase;">Participación</div><div class="chart-wrap"><canvas id="sideChart"></canvas></div></div>
        </div>
    </main>

    <script>
        const COLORS = { clips: '#ff60c0', realestate: '#ffeb3b', inversiones: '#1877F2', business: '#4CAF50', social: ['#3cf0ff','#ff60c0','#1877f2','#ff0000'] };
        let db = { weeks: [], summary: {} };
        let charts = {};

        window.onload = async () => {
            try {
                const r = await fetch('datos.xlsx?v=' + Date.now());
                const ab = await r.arrayBuffer();
                const wb = XLSX.read(ab, {type:'array', cellDates:true});
                process(wb);
                init();
            } catch(e) { document.getElementById('loader').innerText = "ERROR: datos.xlsx no hallado"; }
        };

        function process(wb) {
            wb.SheetNames.forEach(n => {
                const m = n.match(/semana\s*(\d+)/i);
                if(!m) return;
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[n], {header:1, defval:0});
                const hIdx = rows.findIndex(r => r.some(c => String(c).toLowerCase().includes('tiktok')));
                if(hIdx < 0) return;

                const week = { num: m[1], accounts: [], bono: null };
                for(let i = hIdx + 1; i < rows.length; i++) {
                    const label = String(rows[i][0] || '').trim();
                    if(!label || /total|fecha|2026/i.test(label)) continue;
                    if(/bono/i.test(label)) {
                        if(m[1] == "1") week.bono = { user: "@giselarojas.inversiones", amt: "$50" };
                        continue;
                    }
                    if(label.includes('@')) {
                        const type = label.split('.').pop();
                        const metrics = [rows[i][1], rows[i][2], rows[i][3], rows[i][4]].map(v => parseFloat(v) || 0);
                        const total = parseFloat(rows[i][5]) || metrics.reduce((a,b)=>a+b, 0);
                        week.accounts.push({ name: label, type, total, tiktok: metrics[0], instagram: metrics[1], facebook: metrics[2], youtube: metrics[3] });
                        if(!db.summary[label]) db.summary[label] = { type, total: 0, history: [] };
                        db.summary[label].total += total;
                        db.summary[label].history.push(total);
                    }
                }
                db.weeks.push(week);
            });
            db.weeks.sort((a,b) => a.num - b.num);
        }

        function init() {
            const tabs = document.getElementById('tabs');
            const makeTab = (id, lbl, act = false) => {
                const b = document.createElement('button');
                b.className = `tab ${act ? 'active' : ''}`; b.innerText = lbl;
                b.onclick = (e) => { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); e.target.classList.add('active'); render(id); };
                tabs.appendChild(b);
            };
            makeTab('res', 'Resumen Mensual', true);
            db.weeks.forEach(w => makeTab(w.num, `Semana ${w.num}`));
            document.getElementById('loader').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            render('res');
        }

        function render(view) {
            const grid = document.getElementById('kpi-grid');
            const bono = document.getElementById('bono-area');
            grid.innerHTML = ''; bono.innerHTML = '';
            
            if(view === 'res') {
                const tot = Object.values(db.summary).reduce((a,b)=>a+b.total, 0);
                grid.innerHTML = `<div class="card primary-card"><div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;">TOTAL MES</div><div class="val" style="color:var(--lime)">${fmt(tot)}</div></div>`;
                Object.entries(db.summary).forEach(([n, d]) => grid.innerHTML += `<div class="card card-${d.type}"><div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;">${n}</div><div class="val">${fmt(d.total)}</div></div>`);
                draw('res');
            } else {
                const w = db.weeks.find(x => x.num == view);
                const tot = w.accounts.reduce((a,b)=>a+b.total, 0);
                grid.innerHTML = `<div class="card primary-card"><div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;">SEMANA ${view}</div><div class="val">${fmt(tot)}</div></div>`;
                w.accounts.forEach(a => grid.innerHTML += `<div class="card card-${a.type}"><div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;">${a.name}</div><div class="val">${fmt(a.total)}</div></div>`);
                if(w.bono) bono.innerHTML = `<div class="bono-banner"><span style="font-size:24px">🏆</span><div><div style="font-size:10px;color:var(--lime);font-weight:bold;margin-bottom:4px;">BONO SEMANAL</div><div style="font-size:18px;font-weight:800;">${w.bono.user} ha ganado ${w.bono.amt}</div></div></div>`;
                draw(view);
            }
        }

        function draw(view) {
            Object.values(charts).forEach(c => c.destroy());
            const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#9494a5', font: { size: 10 } } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#666', font: { size: 10 } } }, x: { grid: { display: false }, ticks: { color: '#666', font: { size: 10 }, maxRotation: 0 } } } };

            if(view === 'res') {
                charts.m = new Chart(document.getElementById('mainChart'), { type: 'line', data: { labels: db.weeks.map(w=>`Sem ${w.num}`), datasets: Object.entries(db.summary).map(([n, d])=>({ label: n, data: d.history, borderColor: COLORS[d.type], tension: 0.4, pointRadius: 0 })) }, options: opt });
                charts.s = new Chart(document.getElementById('sideChart'), { type: 'doughnut', data: { labels: Object.keys(db.summary), datasets: [{ data: Object.values(db.summary).map(d=>d.total), backgroundColor: Object.values(db.summary).map(d=>COLORS[d.type]), borderWidth: 0 }] }, options: { ...opt, cutout: '75%', scales: undefined } });
            } else {
                const w = db.weeks.find(x => x.num == view);
                charts.m = new Chart(document.getElementById('mainChart'), { type: 'bar', data: { labels: w.accounts.map(a=>a.name.split('.')[1]), datasets: [{ data: w.accounts.map(a=>a.total), backgroundColor: w.accounts.map(a=>COLORS[a.type]), borderRadius: 6 }] }, options: { ...opt, plugins: { legend: { display: false } } } });
                const plats = ['TikTok', 'Instagram', 'Facebook', 'YouTube'];
                const pData = plats.map(p => w.accounts.reduce((s, a) => s + (a[p.toLowerCase()] || 0), 0));
                charts.s = new Chart(document.getElementById('sideChart'), { type: 'doughnut', data: { labels: plats, datasets: [{ data: pData, backgroundColor: COLORS.social, borderWidth: 0 }] }, options: { ...opt, cutout: '75%', scales: undefined } });
            }
        }

        function fmt(n) { return Math.round(n).toLocaleString('es-AR'); }
    </script>
</body>
</html>
