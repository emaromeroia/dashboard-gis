<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS · MULTICUENTAS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #050508; --surface: rgba(12, 12, 18, 0.85); --border: rgba(255,255,255,0.06);
  --text: #e8e4f0; --muted: #5a5870; --lime: #b8ff3c; --radius: 16px;
  /* Colores por Cuenta */
  --c-clips: #ff60c0; --c-realestate: #ffeb3b; --c-inversiones: #1877F2; --c-business: #4CAF50;
  /* Redes */
  --tiktok: #3cf0ff; --ig: #ff60c0; --fb: #1877F2; --yt: #FF0000;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }

/* Fondo con Logo Oso */
.bg-brand {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 50%; height: 50%;
    background: url('ChatGPT Image 5 abr 2026, 02_56_51 p.m..jpg') no-repeat center;
    background-size: contain; opacity: 0.05; filter: blur(4px); z-index: -1;
}

@keyframes reveal { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
.animate-reveal { animation: reveal 0.5s ease-out both; }

#loading-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: fixed; width: 100%; top: 0; left: 0; background: var(--bg); z-index: 1000; }
.topbar { padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(5,5,8,0.95); backdrop-filter: blur(20px); z-index: 100; }
.tab-bar { display: flex; gap: 5px; padding: 0.5rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
.tab { padding: 12px 20px; color: var(--muted); border: none; background: none; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; transition: 0.3s; white-space: nowrap; }
.tab.active { color: var(--lime); font-weight: 700; border-bottom: 2px solid var(--lime); }

.content { padding: 2rem; max-width: 1400px; margin: 0 auto; position: relative; }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 2rem; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; transition: transform 0.3s; backdrop-filter: blur(10px); }
.card:hover { transform: translateY(-3px); }

/* Clases Dinámicas de Colores */
.card-clips { border-top: 4px solid var(--c-clips); } .card-clips .val { color: var(--c-clips); }
.card-realestate { border-top: 4px solid var(--c-realestate); } .card-realestate .val { color: var(--c-realestate); }
.card-inversiones { border-top: 4px solid var(--c-inversiones); } .card-inversiones .val { color: var(--c-inversiones); }
.card-business { border-top: 4px solid var(--c-business); } .card-business .val { color: var(--c-business); }

.val { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; letter-spacing: 1px; }

.panel { background: rgba(18,18,26,0.7); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 1.5rem; }
.grid-resumen { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; }
@media (max-width: 900px) { .grid-resumen { grid-template-columns: 1fr; } }

.chart-container { position: relative; height: 260px; width: 100%; }

.bono-banner { 
  background: linear-gradient(90deg, rgba(184,255,60,0.15), transparent);
  border: 1px solid rgba(184,255,60,0.3); border-radius: var(--radius);
  padding: 1.2rem 2rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 20px;
}
.bono-trophy { font-size: 28px; filter: drop-shadow(0 0 8px var(--lime)); }

.acc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
.acc-mini-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body>

<div class="bg-brand"></div>

<div id="loading-screen">
    <div style="font-size: 3rem; margin-bottom: 1rem;">📊</div>
    <h2 style="font-weight:800; letter-spacing: 1px;">SINCRO GIS</h2>
    <p id="status" style="color:var(--muted); font-size:11px; margin-top:10px;">Cargando datos.xlsx...</p>
</div>

<div id="dash" style="display:none">
    <div class="topbar">
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="width:10px; height:10px; border-radius:50%; background:var(--lime); box-shadow:0 0 10px var(--lime);"></div>
            <div style="font-weight:800; font-size:1rem;">GIS · MULTICUENTAS</div>
        </div>
        <button onclick="location.reload()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:8px 16px; border-radius:8px; cursor:pointer; font-size:10px;">REFRESCAR</button>
    </div>
    <div class="tab-bar" id="tabs"></div>
    <div class="content" id="main"></div>
</div>

<script>
const ACC_MAP = { clips: 'Rosa', realestate: 'Amarillo', inversiones: 'Azul', business: 'Verde' };
const ACC_COLORS = { clips: '#ff60c0', realestate: '#ffeb3b', inversiones: '#1877F2', business: '#4CAF50' };
const RED_COLORS = ['#3cf0ff','#ff60c0','#1877F2','#FF0000'];
let charts = [];

window.onload = async () => {
    try {
        const r = await fetch('datos.xlsx?v=' + Date.now());
        if(!r.ok) throw new Error();
        const ab = await r.arrayBuffer();
        const wb = XLSX.read(ab, {type:'array', cellDates:true});
        const data = parse(wb);
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('dash').style.display = 'block';
        render(data);
    } catch(e) {
        document.getElementById('status').innerHTML = "Sube el archivo 'datos.xlsx' a tu repositorio.";
    }
};

function parse(wb) {
    const weeks = [];
    wb.SheetNames.forEach(n => {
        const m = n.match(/semana\s*(\d+)/i);
        if(!m) return;
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[n], {header:1, defval:''});
        let hRow = rows.findIndex(r => r.some(c => String(c).toLowerCase().includes('tiktok')));
        if(hRow < 0) return;
        const h = rows[hRow].map(c => String(c).toLowerCase());
        const ci = { tik: h.indexOf('tiktok'), ig: h.indexOf('instagram'), fb: h.indexOf('facebook'), yt: h.indexOf('youtube'), tot: h.indexOf('total views') };
        const accs = [];
        let bono = null;
        for(let i = hRow + 1; i < rows.length; i++) {
            const fCol = String(rows[i][0] || '').trim();
            if(!fCol || /total|fecha|link/i.test(fCol)) continue;
            
            // Lógica de Bono (ignorar fecha como usuario)
            if(/bono/i.test(fCol)) {
               if(rows[i+1] && rows[i+1][1] && !/ganadora/i.test(rows[i+1][1])) {
                   bono = { cuenta: rows[i+1][1], monto: rows[i+1][2] };
               }
               i++; continue; 
            }

            const v = { TikTok:pn(rows[i][ci.tik]), Instagram:pn(rows[i][ci.ig]), Facebook:pn(rows[i][ci.fb]), YouTube:pn(rows[i][ci.yt]) };
            const total = pn(rows[i][ci.tot]) || Object.values(v).reduce((a,b)=>a+b,0);
            if(total > 0) accs.push({ name: fCol, type: fCol.split('.').pop(), ...v, total });
        }
        weeks.push({ num: parseInt(m[1]), accounts: accs, bono });
    });
    return { weeks: weeks.sort((a,b) => a.num - b.num) };
}

function pn(v) { const n = parseFloat(String(v).replace(/[^0-9.-]/g, '')); return
