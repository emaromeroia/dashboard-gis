<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS · MULTICUENTAS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #050508; --surface: rgba(12, 12, 18, 0.95); --border: rgba(255,255,255,0.06);
  --text: #e8e4f0; --muted: #5a5870; --lime: #b8ff3c; --radius: 16px;
  --c-clips: #ff60c0; --c-realestate: #ffeb3b; --c-inversiones: #1877F2; --c-business: #4CAF50;
  --tiktok: #3cf0ff; --ig: #ff60c0; --fb: #1877F2; --yt: #FF0000;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }

.bg-brand {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 45%; height: 45%; background: url('logo_oso.jpg') no-repeat center;
    background-size: contain; opacity: 0.05; filter: blur(2px); z-index: -1;
}

#loading-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: fixed; width: 100%; top: 0; left: 0; background: var(--bg); z-index: 1000; }
.topbar { padding: 1.2rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(5,5,8,0.95); backdrop-filter: blur(20px); z-index: 100; }
.tab-bar { display: flex; gap: 5px; padding: 0.5rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.tab { padding: 12px 20px; color: var(--muted); border: none; background: none; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; transition: 0.3s; white-space: nowrap; }
.tab.active { color: var(--lime); font-weight: 700; border-bottom: 2px solid var(--lime); }

.content { padding: 2rem; max-width: 1400px; margin: 0 auto; position: relative; }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 2rem; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; transition: 0.3s; backdrop-filter: blur(15px); }

.card-clips { border-top: 4px solid var(--c-clips); } .card-clips .val { color: var(--c-clips); }
.card-realestate { border-top: 4px solid var(--c-realestate); } .card-realestate .val { color: var(--c-realestate); }
.card-inversiones { border-top: 4px solid var(--c-inversiones); } .card-inversiones .val { color: var(--c-inversiones); }
.card-business { border-top: 4px solid var(--c-business); } .card-business .val { color: var(--c-business); }

.val { font-size: 28px; font-weight: 800; letter-spacing: -1.5px; }
.label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }

.panel { background: rgba(18,18,26,0.75); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 1.5rem; }
.chart-container { position: relative; height: 280px; width: 100%; }

.bono-banner { 
  background: linear-gradient(90deg, rgba(184,255,60,0.15), transparent);
  border: 1px solid rgba(184,255,60,0.3); border-radius: var(--radius);
  padding: 1.2rem 2rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 20px;
  animation: reveal 0.8s ease-out;
}
@keyframes reveal { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>
<div class="bg-brand"></div>
<div id="loading-screen">
    <div style="font-size: 3rem; margin-bottom: 1rem;">📊</div>
    <h2 style="font-weight:800; letter-spacing: 1px;">SINCRO GIS</h2>
    <p id="status" style="color:var(--muted); font-size:11px; margin-top:10px;">Validando métricas...</p>
</div>

<div id="dash" style="display:none">
    <div class="topbar">
        <div style="font-weight:800; font-size:1rem;">GIS · MULTICUENTAS</div>
        <button onclick="location.reload()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:8px 16px; border-radius:8px; font-size:10px; cursor:pointer; font-weight:700;">REFRESCAR</button>
    </div>
    <div class="tab-bar" id="tabs"></div>
    <div class="content" id="main"></div>
</div>

<script>
const ACC_COLORS = { clips: '#ff60c0', realestate: '#ffeb3b', inversiones: '#1877F2', business: '#4CAF50' };
const RED_COLORS = ['#3cf0ff','#ff60c0','#1877F2','#FF0000'];
let charts = [];

window.onload = async () => {
    try {
        const r = await fetch('datos.xlsx?v=' + Date.now());
        if(!r.ok) throw new Error();
        const ab = await r.arrayBuffer();
        const wb = XLSX.read(ab, {type:'array', cellDates:true});
        const data = parse(wb);
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('dash').style.display = 'block';
        render(data);
    } catch(e) {
        document.getElementById('status').innerHTML = "Sube 'datos.xlsx' a GitHub.";
    }
};

function parse(wb) {
    const weeks = [];
    wb.SheetNames.forEach(n => {
        const m = n.match(/semana\s*(\d+)/i);
        if(!m) return;
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[n], {header:1, defval:''});
        let hRow = rows.findIndex(r => r.some(c => String(c).toLowerCase().includes('tiktok')));
        if(hRow < 0) return;
        const h = rows[hRow].map(c => String(c).toLowerCase());
        const ci = { tik: h.indexOf('tiktok'), ig: h.indexOf('instagram'), fb: h.indexOf('facebook'), yt: h.indexOf('youtube'), tot: h.indexOf('total views') };
        const accs = [];
        let bono = null;
        for(let i = hRow + 1; i < rows.length; i++) {
            const fCol = String(rows[i][0] || '').trim();
            // FILTRO DE SEGURIDAD: Solo procesar si tiene @ (es una cuenta real)
            if(!fCol || /total|fecha|link|ganadora|2026/i.test(fCol)) continue;
            
            if(/bono/i.test(fCol)) {
                if(rows[i+1] && rows[i+1][1] && String(rows[i+1][1]).includes('@')) {
                    bono = { cuenta: rows[i+1][1], monto: rows[i+1][2] };
                }
                i++; continue; 
            }
            if(fCol.includes('@')) {
                const v = { TikTok:pn(rows[i][ci.tik]), Instagram:pn(rows[i][ci.ig]), Facebook:pn(rows[i][ci.fb]), YouTube:pn(rows[i][ci.yt]) };
                const total = pn(rows[i][ci.tot]) || Object.values(v).reduce((a,b)=>a+b,0);
                accs.push({ name: fCol, type: fCol.split('.').pop(), ...v, total });
            }
        }
        weeks.push({ num: parseInt(m[1]), accounts: accs, bono });
    });
    return { weeks: weeks.sort((a,b) => a.num - b.num) };
}

function pn(v) { const n = parseFloat(String(v).replace(/[^0-9.-]/g, '')); return isNaN(n)?0:n; }

function render(data) {
    const tabs = document.getElementById('tabs'); tabs.innerHTML = '';
    const res = buildRes(data.weeks);
    const addTab = (lbl, fn, active=false) => {
        const b = document.createElement('button');
        b.className = 'tab' + (active?' active':'');
        b.textContent = lbl;
        b.onclick = () => { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); b.classList.add('active'); fn(); };
        tabs.appendChild(b);
    };
    addTab('Resumen', () => showRes(res, data.weeks), true);
    data.weeks.forEach(w => addTab('Semana '+w.num, () => showWeek(w)));
    showRes(res, data.weeks);
}

function buildRes(weeks) {
    const res = {};
    weeks.forEach((w, i) => w.accounts.forEach(a => {
        if(!res[a.name]) res[a.name] = { type: a.type, total: 0, history: Array(weeks.length).fill(0) };
        res[a.name].total += a.total; res[a.name].history[i] = a.total;
    }));
    return res;
}

function showRes(res, weeks) {
    clear();
    const names = Object.keys(res);
    const grand = names.reduce((s,n)=>s+res[n].total,0);
    let h = `<div class="metrics-grid"><div class="card" style="border-top:4px solid var(--lime)"><div class="label">Total Mes</div><div class="val" style="color:var(--lime)">${fmt(grand)}</div></div>`;
    names.forEach(n => h += `<div class="card card-${res[n].type}"><div class="label">${n}</div><div class="val">${fmt(res[n].total)}</div></div>`);
    h += `</div><div style="display:grid; grid-template-columns: 1.6fr 1fr; gap:16px;">
            <div class="panel"><div class="label">Crecimiento Semanal</div><div class="chart-container"><canvas id="c1"></canvas></div></div>
            <div class="panel"><div class="label">Participación</div><div class="chart-container"><canvas id="c2"></canvas></div></div>
          </div>`;
    document.getElementById('main').innerHTML = h;
    new Chart(document.getElementById('c1'), { type:'line', data:{ labels:weeks.map(w=>'Sem '+w.num), datasets: names.map(n=>({label:n, data:res[n].history, borderColor:ACC_COLORS[res[n].type], tension:0.4, pointRadius:4})) }, options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'#8a87a0', font:{size:10}}}} }});
    new Chart(document.getElementById('c2'), { type:'doughnut', data:{ labels:names, datasets:[{data:names.map(n=>res[n].total), backgroundColor:names.map(n=>ACC_COLORS[res[n].type]), borderWidth:0}] }, options:{ responsive:true, maintainAspectRatio:false, cutout:'70%', plugins:{legend:{position:'bottom', labels:{color:'#8a87a0', font:{size:10}, usePointStyle:true}}} }});
}

function showWeek(w) {
    clear();
    const totals = {TikTok:0, Instagram:0, Facebook:0, YouTube:0};
    w.accounts.forEach(a => { totals.TikTok+=a.TikTok; totals.Instagram+=a.Instagram; totals.Facebook+=a.Facebook; totals.YouTube+=a.YouTube; });
    const grand = Object.values(totals).reduce((a,b)=>a+b,0);
    let h = '';
    if(w.bono) h += `<div class="bono-banner"><div><span style="font-size:24px">🏆</span></div><div><div class="label" style="color:var(--lime);margin:0">Bono Semanal</div><div style="font-size:18px;font-weight:800">${w.bono.cuenta} <span style="color:var(--lime)">(${w.bono.monto})</span></div></div></div>`;
    h += `<div class="metrics-grid"><div class="card" style="border-top:4px solid var(--lime)"><div class="label">Semana ${w.num}</div><div class="val">${fmt(grand)}</div></div>`;
    w.accounts.forEach(a => h += `<div class="card card-${a.type}"><div class="label">${a.name}</div><div class="val">${fmt(a.total)}</div></div>`);
    h += `</div><div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:16px;">
            <div class="panel"><div class="label">Distribución Redes</div><div class="chart-container"><canvas id="p1"></canvas></div></div>
            <div class="panel"><div class="label">Rendimiento Cuentas</div><div class="chart-container"><canvas id="p2"></canvas></div></div>
          </div>`;
    document.getElementById('main').innerHTML = h;
    new Chart(document.getElementById('p1'), { type:'doughnut', data:{ labels:Object.keys(totals), datasets:[{data:Object.values(totals), backgroundColor:RED_COLORS, borderWidth:0}] }, options:{ responsive:true, maintainAspectRatio:false, cutout:'70%', plugins:{legend:{position:'bottom', labels:{color:'#8a87a0', font:{size:10}, usePointStyle:true}}} }});
    new Chart(document.getElementById('p2'), { type:'bar', data:{ labels:w.accounts.map(a=>a.name.split('.')[1]), datasets:[{data:w.accounts.map(a=>a.total), backgroundColor:w.accounts.map(a=>ACC_COLORS[a.type]), borderRadius:4}] }, options:{ responsive:true, maintainAspectRatio:false, scales:{x:{ticks:{color:'#8a87a0', font:{size:10}, minRotation:0, maxRotation:0}}, y:{grid:{color:'rgba(255,255,255,0.05)'}}}, plugins:{legend:{display:false}} }});
}

function fmt(n) { return Math.round(n).toLocaleString('es-AR'); }
function clear() { charts.forEach(c=>c.destroy()); charts = []; }
</script>
</body>
</html>
